name: cojunta_mobile
description: Sistema de Administración de Conjunto Residencial — App Móvil
version: 1.5.0+5
publish_to: none

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navegación
  go_router: ^14.6.3

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP — API REST
  dio: ^5.8.0+1

  # Auth — almacenamiento seguro del token Sanctum
  flutter_secure_storage: ^9.2.4

  # WebSocket — cliente Pusher protocol sobre raw WebSocket (para Reverb en Railway)
  web_socket_channel: ^3.0.1

  # Push notifications — FCM
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.5

  # Caché local — modo offline (RF-APP-15)
  hive_flutter: ^1.1.0

  # Imágenes, escaneo y generación de QR
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  mobile_scanner: ^6.0.0
  qr_flutter: ^4.1.0
  share_plus: ^10.0.0

  # Archivos PDF (recibos, paz y salvo, actas)
  file_picker: ^8.3.3
  open_filex: ^4.4.1

  # Utilidades
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A1641"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
