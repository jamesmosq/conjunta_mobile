name: cojunta_mobile
description: Sistema de Administración de Conjunto Residencial — App Móvil
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^14.6.3

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP — API REST
  dio: ^5.8.0+1

  # Auth — almacenamiento seguro del token Sanctum
  flutter_secure_storage: ^9.2.4

  # WebSocket — Reverb usa protocolo Pusher
  pusher_channels_flutter: ^2.1.0

  # Push notifications — FCM
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.5

  # Caché local — modo offline (RF-APP-15)
  hive_flutter: ^1.1.0

  # Imágenes
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Archivos PDF (recibos, paz y salvo, actas)
  file_picker: ^8.3.3
  open_filex: ^4.4.1

  # Utilidades
  intl: ^0.20.2
  equatable: ^2.0.5
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4
  freezed: ^3.0.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
